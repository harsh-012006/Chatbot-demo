<!DOCTYPE html>
<html>
  <head>
    <title>Chatbot practice</title>
  </head>
  <body>
    <div class="js-container"></div>
    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/chatbot.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>

    <script src="https://unpkg.com/supersimpledev/babel.js"></script>
    <script type="text/babel">
    function ChatInput({chatMessages,setChatMessages}){
        const [inputText,setInputText]= React.useState('');
        function saveInputText(event){
            setInputText(event.target.value);
        }
        function sendMessage(){
            const newChatMessages=[...chatMessages,{message:inputText,sender:'user'}];
            // setChatMessages(newChatMessages);
            const response= Chatbot.getResponse(inputText);
            setChatMessages([...newChatMessages,{message:response,sender:'robot'}]);
            setInputText('');
        }
        return(
            <>
            <input placeholder="Enter your message" size="50"
            onChange={saveInputText} value={inputText}/>
            <button onClick={sendMessage}>Send</button>
            </>
    )
    }
    function ChatMessage({sender,message}){
        return(
            <div>
                {sender==='robot' && <img src="robot.png" width="40"/>}
                {message}
                {sender==='user' && <img src="user.png" width="40"/>}
            </div>
        )
    }
    function App(){
        const [chatMessages,setChatMessages] = React.useState([{
                    message: 'hello chatbot',
                    sender: 'user',
                    id:'id1'
                }, {
                    message: 'Hello! How can I help you?',
                    sender: 'robot',
                    id:'id2'
                }, {
                    message: "can you get me today's date",
                    sender: 'user',
                    id:'id3'
                }, {
                    message: 'Today is March 31',
                    sender: 'robot',
                    id:'id4'
                }
                ]);
        
        const messcom=chatMessages.map((chat)=>{
            return(
                <ChatMessage message={chat.message} sender={chat.sender} key={chat.id} />
            );
        });
        return(
            <>
            <ChatInput chatMessages={chatMessages} setChatMessages={setChatMessages}/>
            
            {messcom}
            </>
        )
    }
    const container = document.querySelector('.js-container');
    ReactDOM.createRoot(container).render(<App />);
    </script>
  </body>
</html>
